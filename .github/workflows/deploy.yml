# Employee Portal — Deployment Workflow Skeleton
# Inception baseline: structure only, steps to be filled in Elaboration/Construction
#
# Deployment Mode: Custom-Built (internal Windows Server)
# Target: Internal corporate network, no cloud
#
name: Deploy Employee Portal

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production

env:
  DOTNET_VERSION: '10.0'
  PROJECT_PATH: 'src/EmployeePortal/EmployeePortal.csproj'

jobs:
  # Phase: Elaboration — fill build + test steps
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}
      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
      # TODO (Elaboration): Add test step
      # TODO (Elaboration): Add publish step
      # TODO (Transition): Add deployment to Windows Server
