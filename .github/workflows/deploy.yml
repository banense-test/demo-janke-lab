      #   - Deploy via PowerShell remoting or file copy to Windows Server
      #   - Run smoke tests (portal accessible, AD auth works)
      #   - Notify HR Director of go-live

  # Phase: Transition — fill deploy steps
  deploy:
    name: Deploy to Production
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
