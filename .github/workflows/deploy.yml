# Employee Portal — Deployment Workflow Skeleton
# Inception baseline: structure only; stages to be filled in Elaboration/Construction
#
# Deployment mode: Custom-Built (internal Windows Server, no cloud)
# Target: 200 employees, 3 offices, corporate intranet

name: Employee Portal Deploy

on:
  push:
    branches:
      - main
      - 'elaboration/**'
      - 'construction/**'
      - 'transition/**'
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  POSTGRES_VERSION: '16'

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      # TODO (Elaboration): Add unit test step
      # TODO (Elaboration): Add integration test step with PostgreSQL service container

  # TODO (Elaboration): Add deploy-dev job — deploy to dev Windows Server
  # TODO (Construction): Add deploy-staging job — deploy to staging environment
  # TODO (Transition): Add deploy-production job — deploy to production Windows Server
  # TODO (Transition): Add acceptance gate checks — dev-site then install-site
