# Employee Portal — Infrastructure as Code Base
# Inception baseline: skeleton only
#
# For a single-server intranet deployment, full Kubernetes/Helm is not required.
# This file serves as a placeholder for infrastructure configuration scripts
# that will be developed in Elaboration/Construction phases.
#
# Deployment target: Internal Windows Server (no cloud, no containers required)
# Components: .NET 10 Kestrel, PostgreSQL, SQLite (offline buffer)
#
# TODO (Elaboration): Replace with PowerShell DSC or Ansible playbook
# for Windows Server configuration management.
#
# Key infrastructure tasks for future phases:
# 1. Install .NET 10 runtime on Windows Server
# 2. Install and configure PostgreSQL (TCP 5432)
# 3. Configure firewall rules (HTTP/HTTPS inbound, TCP 5432 local, TCP 389/636 to AD)
# 4. Create service account for portal application
# 5. Configure AD connection (LDAP/OAuth2 — method TBD Elaboration spike)
# 6. Set up SQLite offline buffer directory with appropriate permissions
# 7. Configure Windows Service for Kestrel auto-start
# 8. Set up PostgreSQL backup schedule
